# Same as environment.yml plus vLLM (use on Linux or WSL2 with NVIDIA GPU).
# Native Windows: prefer environment.yml — vLLM pip wheels are usually Linux-only.
#
#   conda env create -f environment-vllm.yml
#   conda activate cse151b-math-qa
#   python scripts/register_jupyter_kernel.py

name: cse151b-math-qa
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11.*
  - pip>=24

  - sympy>=1.12
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - tqdm>=4.66
  - jupyter>=1.0.0
  - ipykernel>=6.29.0
  - notebook>=7.0.0

  - pytorch::pytorch>=2.4.0
  - pytorch::pytorch-cuda=12.4

  - pip:
      - transformers>=4.45.0
      - accelerate>=0.34.0
      - safetensors>=0.4.0
      - huggingface_hub>=0.24.0
      - bitsandbytes>=0.43.0
      - antlr4-python3-runtime==4.11.1
      - vllm>=0.6.0
